<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PuntoStock — Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg:        #0D1117;
    --bg2:       #161B22;
    --bg3:       #1C2128;
    --border:    rgba(255,255,255,0.08);
    --green:     #7ED321;
    --green-dim: rgba(126,211,33,0.12);
    --red:       #F85149;
    --orange:    #F0A500;
    --blue:      #58A6FF;
    --purple:    #8B5CF6;
    --text:      #E6EDF3;
    --text2:     #8B949E;
    --text3:     #484F58;
    --radius:    10px;
    --mono:      'JetBrains Mono', 'Fira Code', monospace;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size:14px; min-height:100vh; }

  /* ── Auth screen ── */
  #auth-screen {
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;
  }
  .auth-box {
    background:var(--bg2); border:1px solid var(--border); border-radius:16px;
    padding:40px; width:100%; max-width:380px;
  }
  .auth-box h1 { font-size:22px; font-weight:800; margin-bottom:4px; }
  .auth-box p  { color:var(--text2); font-size:13px; margin-bottom:28px; }
  .field { margin-bottom:16px; }
  .field label { display:block; font-size:12px; font-weight:600; color:var(--text2); margin-bottom:6px; text-transform:uppercase; letter-spacing:.5px; }
  .field input { width:100%; padding:10px 14px; background:var(--bg3); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:14px; outline:none; transition:border-color .2s; }
  .field input:focus { border-color:var(--green); }
  .btn-login { width:100%; padding:12px; background:var(--green); color:#0D1117; font-weight:700; font-size:14px; border:none; border-radius:8px; cursor:pointer; transition:opacity .2s; }
  .btn-login:hover { opacity:.85; }
  #auth-err { display:none; margin-top:12px; padding:10px 14px; background:rgba(248,81,73,.1); border:1px solid rgba(248,81,73,.25); border-radius:8px; font-size:13px; color:var(--red); }

  /* ── App ── */
  #app { display:none; min-height:100vh; flex-direction:column; }

  /* Topbar */
  .topbar {
    height:56px; background:var(--bg2); border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between; padding:0 24px;
    position:sticky; top:0; z-index:100;
  }
  .topbar-left { display:flex; align-items:center; gap:12px; }
  .topbar-logo { font-size:16px; font-weight:800; }
  .topbar-logo span { color:var(--green); }
  .topbar-badge { background:var(--green-dim); border:1px solid rgba(126,211,33,.3); color:var(--green); font-size:10px; font-weight:700; padding:2px 8px; border-radius:4px; text-transform:uppercase; letter-spacing:.5px; }
  .topbar-right { display:flex; align-items:center; gap:12px; }
  .topbar-email { font-size:12px; color:var(--text2); }
  .btn-logout { padding:6px 14px; background:transparent; border:1px solid var(--border); border-radius:6px; color:var(--text2); font-size:12px; cursor:pointer; transition:all .2s; }
  .btn-logout:hover { border-color:var(--red); color:var(--red); }

  /* Stats */
  .stats-bar { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; padding:24px 24px 0; }
  .stat { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:18px 20px; }
  .stat-label { font-size:11px; color:var(--text2); font-weight:600; text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }
  .stat-val { font-size:26px; font-weight:800; font-family:var(--mono); }
  .stat-val.green  { color:var(--green); }
  .stat-val.orange { color:var(--orange); }
  .stat-val.blue   { color:var(--blue); }
  .stat-val.purple { color:var(--purple); }

  /* Toolbar */
  .toolbar { padding:20px 24px 12px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .search-box { flex:1; min-width:220px; position:relative; }
  .search-box input { width:100%; padding:9px 12px 9px 36px; background:var(--bg2); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:13px; outline:none; }
  .search-box input:focus { border-color:var(--green); }
  .search-box svg { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--text3); }
  .filter-sel { padding:9px 12px; background:var(--bg2); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:13px; cursor:pointer; outline:none; }
  .btn-refresh { padding:9px 16px; background:var(--green-dim); border:1px solid rgba(126,211,33,.3); border-radius:8px; color:var(--green); font-size:13px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:6px; transition:all .2s; white-space:nowrap; }
  .btn-refresh:hover { background:rgba(126,211,33,.2); }

  /* Table */
  .table-wrap { padding:0 24px 40px; overflow-x:auto; }
  table { width:100%; border-collapse:collapse; }
  thead th { padding:10px 14px; text-align:left; font-size:11px; font-weight:700; color:var(--text2); text-transform:uppercase; letter-spacing:.5px; border-bottom:1px solid var(--border); white-space:nowrap; }
  tbody tr { border-bottom:1px solid var(--border); transition:background .15s; }
  tbody tr:hover { background:rgba(255,255,255,.02); }
  tbody td { padding:14px; vertical-align:middle; }
  .td-mono { font-family:var(--mono); font-size:12px; }
  .td-muted { color:var(--text2); }

  /* Badges */
  .badge { display:inline-flex; align-items:center; gap:4px; padding:3px 9px; border-radius:999px; font-size:11px; font-weight:700; white-space:nowrap; }
  .badge-green  { background:rgba(126,211,33,.12); color:var(--green); border:1px solid rgba(126,211,33,.2); }
  .badge-red    { background:rgba(248,81,73,.1);   color:var(--red);   border:1px solid rgba(248,81,73,.2); }
  .badge-orange { background:rgba(240,165,0,.1);   color:var(--orange);border:1px solid rgba(240,165,0,.2); }
  .badge-blue   { background:rgba(88,166,255,.1);  color:var(--blue);  border:1px solid rgba(88,166,255,.2); }
  .badge-purple { background:rgba(139,92,246,.1);  color:var(--purple);border:1px solid rgba(139,92,246,.2); }
  .badge-muted  { background:rgba(255,255,255,.05);color:var(--text2); border:1px solid var(--border); }

  /* Actions */
  .actions { display:flex; gap:6px; flex-wrap:wrap; }
  .btn-sm { padding:5px 10px; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; border:1px solid; transition:all .15s; white-space:nowrap; }
  .btn-act   { background:rgba(88,166,255,.1);  color:var(--blue);   border-color:rgba(88,166,255,.25); }
  .btn-act:hover { background:rgba(88,166,255,.2); }
  .btn-tog-on  { background:rgba(248,81,73,.1);  color:var(--red);    border-color:rgba(248,81,73,.25); }
  .btn-tog-on:hover  { background:rgba(248,81,73,.2); }
  .btn-tog-off { background:rgba(126,211,33,.1); color:var(--green);  border-color:rgba(126,211,33,.25); }
  .btn-tog-off:hover { background:rgba(126,211,33,.2); }
  .btn-plan  { background:rgba(139,92,246,.1);   color:var(--purple); border-color:rgba(139,92,246,.25); }
  .btn-plan:hover  { background:rgba(139,92,246,.2); }
  .btn-trial { background:rgba(240,165,0,.1);    color:var(--orange); border-color:rgba(240,165,0,.25); }
  .btn-trial:hover { background:rgba(240,165,0,.2); }

  /* Negocio name */
  .biz-name { font-weight:700; font-size:13px; margin-bottom:2px; }
  .biz-sub  { font-size:11px; color:var(--text2); }

  /* Trial bar */
  .trial-bar { width:80px; height:4px; background:var(--bg3); border-radius:2px; margin-top:4px; overflow:hidden; }
  .trial-fill { height:100%; border-radius:2px; transition:width .3s; }

  /* Loader */
  .loader-wrap { padding:60px; text-align:center; color:var(--text2); }
  .spin { display:inline-block; width:20px; height:20px; border:2px solid var(--border); border-top-color:var(--green); border-radius:50%; animation:spin .8s linear infinite; margin-right:8px; vertical-align:middle; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* Modal */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); backdrop-filter:blur(4px); z-index:200; display:flex; align-items:center; justify-content:center; padding:20px; }
  .modal { background:var(--bg2); border:1px solid var(--border); border-radius:16px; padding:28px; width:100%; max-width:420px; }
  .modal h3 { font-size:17px; font-weight:800; margin-bottom:6px; }
  .modal-sub { font-size:13px; color:var(--text2); margin-bottom:20px; line-height:1.5; }
  .modal-field { margin-bottom:14px; }
  .modal-field label { display:block; font-size:11px; font-weight:600; color:var(--text2); margin-bottom:6px; text-transform:uppercase; }
  .modal-field select, .modal-field input { width:100%; padding:10px 12px; background:var(--bg3); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:13px; outline:none; }
  .modal-footer { display:flex; gap:10px; justify-content:flex-end; margin-top:20px; }
  .btn-cancel { padding:9px 18px; background:transparent; border:1px solid var(--border); border-radius:8px; color:var(--text2); font-size:13px; cursor:pointer; }
  .btn-confirm { padding:9px 18px; background:var(--green); border:none; border-radius:8px; color:#0D1117; font-size:13px; font-weight:700; cursor:pointer; }
  .btn-confirm:hover { opacity:.85; }

  /* Toast */
  #toast { position:fixed; bottom:24px; right:24px; z-index:300; display:flex; flex-direction:column; gap:8px; }
  .toast-item { padding:12px 18px; border-radius:10px; font-size:13px; font-weight:600; animation:slideIn .25s ease; display:flex; align-items:center; gap:8px; }
  .toast-item.ok  { background:#1a2e1a; border:1px solid rgba(126,211,33,.3); color:var(--green); }
  .toast-item.err { background:#2e1a1a; border:1px solid rgba(248,81,73,.3);  color:var(--red); }
  @keyframes slideIn { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }

  @media (max-width:900px) {
    .stats-bar { grid-template-columns:1fr 1fr; }
    .topbar-email { display:none; }
  }
  @media (max-width:600px) {
    .stats-bar { grid-template-columns:1fr 1fr; gap:10px; padding:16px 16px 0; }
    .toolbar, .table-wrap { padding-left:16px; padding-right:16px; }
  }
</style>
</head>
<body>

<!-- ── AUTH ── -->
<div id="auth-screen">
  <div class="auth-box">
    <h1>PuntoStock <span style="color:var(--green)">Admin</span></h1>
    <p>Acceso restringido a administradores</p>
    <div class="field">
      <label>Email</label>
      <input type="email" id="a-email" autocomplete="email" placeholder="admin@ejemplo.com">
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="a-pass" autocomplete="current-password" placeholder="••••••••">
    </div>
    <button class="btn-login" onclick="doLogin()">Ingresar</button>
    <div id="auth-err"></div>
  </div>
</div>

<!-- ── APP ── -->
<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">Punto<span>Stock</span></div>
      <div class="topbar-badge">Admin Panel</div>
    </div>
    <div class="topbar-right">
      <span class="topbar-email" id="admin-email"></span>
      <button class="btn-logout" onclick="doLogout()">Cerrar sesión</button>
    </div>
  </div>

  <div class="stats-bar" id="stats-bar">
    <div class="stat"><div class="stat-label">Negocios</div><div class="stat-val blue" id="s-total">—</div></div>
    <div class="stat"><div class="stat-label">Activos</div><div class="stat-val green" id="s-activos">—</div></div>
    <div class="stat"><div class="stat-label">En trial</div><div class="stat-val orange" id="s-trial">—</div></div>
    <div class="stat"><div class="stat-label">Pro / Pago</div><div class="stat-val purple" id="s-pro">—</div></div>
  </div>

  <div class="toolbar">
    <div class="search-box">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search" placeholder="Buscar negocio, email..." oninput="filtrar()">
    </div>
    <select class="filter-sel" id="filter-plan" onchange="filtrar()">
      <option value="">Todos los planes</option>
      <option value="trial">Trial</option>
      <option value="pro_mensual">Pro Mensual</option>
      <option value="pro_anual">Pro Anual</option>
      <option value="multi">Multi-negocio</option>
    </select>
    <select class="filter-sel" id="filter-estado" onchange="filtrar()">
      <option value="">Todos los estados</option>
      <option value="activo">Activos</option>
      <option value="inactivo">Inactivos</option>
    </select>
    <button class="btn-refresh" onclick="cargarNegocios()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      Actualizar
    </button>
  </div>

  <div class="table-wrap">
    <div id="tabla-container">
      <div class="loader-wrap"><span class="spin"></span> Cargando negocios...</div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── Config ───────────────────────────────────────────────────
const SUPABASE_URL       = 'https://yvqcgjvxwdktyonbehil.supabase.co';
const SUPABASE_ANON      = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2cWNnanZ4d2RrdHlvbmJlaGlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MjY5MDcsImV4cCI6MjA5NzMwMjkwN30.b0IF4E-CtI4wen2eQQEW2sG_-bKtK970MB-wW0B0pvI';
const SUPABASE_SERVICE   = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2cWNnanZ4d2RrdHlvbmJlaGlsIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MTcyNjkwNywiZXhwIjoyMDk3MzAyOTA3fQ.Wl71jj7O-i04NWv6YT2ZMU9DaaqZFs9Wl45vcUHVIe4';
const sb      = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
const sbAdmin = window.supabase.createClient(SUPABASE_URL, SUPABASE_SERVICE);

let todosNegocios = [];

// ── Auth ─────────────────────────────────────────────────────
// Lista de emails admin (control local simple)
const ADMIN_EMAILS = ['ericexequielbenitez@gmail.com'];

async function doLogin() {
  const email = document.getElementById('a-email').value.trim();
  const pass  = document.getElementById('a-pass').value;
  if (!email || !pass) { showErr('Completá email y contraseña.'); return; }

  if (!ADMIN_EMAILS.includes(email.toLowerCase())) {
    showErr('No tenés permisos de administrador.');
    return;
  }

  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) { showErr('Email o contraseña incorrectos.'); return; }

  document.getElementById('admin-email').textContent = data.user.email;
  showScreen('app');
  cargarNegocios();
}

async function doLogout() {
  await sb.auth.signOut();
  showScreen('auth');
}

// Verificar si ya hay sesión activa al cargar
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (!session || !ADMIN_EMAILS.includes(session.user.email.toLowerCase())) {
    showScreen('auth'); return;
  }
  document.getElementById('admin-email').textContent = session.user.email;
  showScreen('app');
  cargarNegocios();
})();

function showErr(msg) {
  const el = document.getElementById('auth-err');
  el.style.display = 'block';
  el.textContent = msg;
}

function showScreen(s) {
  document.getElementById('auth-screen').style.display = s === 'auth' ? 'flex' : 'none';
  document.getElementById('app').style.display         = s === 'app'  ? 'flex' : 'none';
}

// ── Cargar negocios ──────────────────────────────────────────
async function cargarNegocios() {
  document.getElementById('tabla-container').innerHTML =
    '<div class="loader-wrap"><span class="spin"></span> Cargando negocios...</div>';

  // Usar RPCs con security definer que bypasean RLS
  const [{ data: bizs }, { data: prodsStats }, { data: ventasStats }] = await Promise.all([
    sb.rpc('get_all_businesses'),
    sb.rpc('get_all_productos_count'),
    sb.rpc('get_all_ventas_stats')
  ]);

  const prodCount  = {};
  const ventaCount = {};
  const ventaTotal = {};
  (prodsStats  || []).forEach(p => { prodCount[p.business_id]  = parseInt(p.cant) || 0; });
  (ventasStats || []).forEach(v => {
    ventaCount[v.business_id] = parseInt(v.cant)  || 0;
    ventaTotal[v.business_id] = parseFloat(v.total) || 0;
  });

  todosNegocios = (bizs || []).map(b => ({
    ...b,
    _prods:       prodCount[b.id]  || 0,
    _ventas:      ventaCount[b.id] || 0,
    _ventaTotal:  ventaTotal[b.id] || 0
  }));

  actualizarStats();
  filtrar();
}

function actualizarStats() {
  const total   = todosNegocios.length;
  const activos = todosNegocios.filter(b => b.active).length;
  const trial   = todosNegocios.filter(b => b.plan === 'trial').length;
  const pro     = todosNegocios.filter(b => b.plan !== 'trial').length;
  document.getElementById('s-total').textContent   = total;
  document.getElementById('s-activos').textContent = activos;
  document.getElementById('s-trial').textContent   = trial;
  document.getElementById('s-pro').textContent     = pro;
}

// ── Filtrar ──────────────────────────────────────────────────
function filtrar() {
  const q      = document.getElementById('search').value.toLowerCase().trim();
  const fPlan  = document.getElementById('filter-plan').value;
  const fEst   = document.getElementById('filter-estado').value;

  const lista = todosNegocios.filter(b => {
    const matchQ = !q || b.name?.toLowerCase().includes(q) || b.email?.toLowerCase().includes(q) || b.owner_name?.toLowerCase().includes(q);
    const matchP = !fPlan || b.plan === fPlan;
    const matchE = !fEst  || (fEst === 'activo' ? b.active : !b.active);
    return matchQ && matchP && matchE;
  });

  renderTabla(lista);
}

// ── Render tabla ─────────────────────────────────────────────
function renderTabla(lista) {
  const container = document.getElementById('tabla-container');
  if (!lista.length) {
    container.innerHTML = '<div class="loader-wrap" style="color:var(--text2)">Sin resultados</div>';
    return;
  }

  const planBadge = {
    trial:       '<span class="badge badge-orange">Trial</span>',
    pro_mensual: '<span class="badge badge-green">Pro Mensual</span>',
    pro_anual:   '<span class="badge badge-blue">Pro Anual</span>',
    multi:       '<span class="badge badge-purple">Multi</span>',
  };

  const tipoBadge = {
    kiosco:'🏪', ropa:'👕', comida:'🍔', verduleria:'🥦',
    farmacia:'💊', electronica:'💻', ferreteria:'🔧', otro:'📦'
  };

  const rows = lista.map(b => {
    const trialEnds  = b.trial_ends ? new Date(b.trial_ends) : null;
    const diasTrial  = trialEnds ? Math.ceil((trialEnds - new Date()) / (1000*60*60*24)) : null;
    const trialPct   = trialEnds ? Math.max(0, Math.min(100, Math.round((diasTrial / 7) * 100))) : 0;
    const trialColor = diasTrial <= 0 ? 'var(--red)' : diasTrial <= 2 ? 'var(--red)' : diasTrial <= 4 ? 'var(--orange)' : 'var(--green)';
    const trialLabel = diasTrial === null ? '—' : diasTrial <= 0 ? 'Vencido' : diasTrial === 1 ? '1 día' : `${diasTrial} días`;

    const estadoBadge = b.active
      ? '<span class="badge badge-green">● Activo</span>'
      : '<span class="badge badge-red">● Inactivo</span>';

    return `
      <tr>
        <td>
          <div class="biz-name">${tipoBadge[b.tipo_negocio] || '📦'} ${b.name}</div>
          <div class="biz-sub">${b.owner_name || ''}</div>
        </td>
        <td class="td-muted" style="font-size:12px;">${b.email || '—'}</td>
        <td>${planBadge[b.plan] || `<span class="badge badge-muted">${b.plan}</span>`}</td>
        <td>${estadoBadge}</td>
        <td>
          ${b.plan === 'trial' ? `
            <div style="font-size:12px; color:${trialColor}; font-weight:700;">${trialLabel}</div>
            <div class="trial-bar"><div class="trial-fill" style="width:${trialPct}%; background:${trialColor};"></div></div>
          ` : '<span style="font-size:12px; color:var(--text2);">—</span>'}
        </td>
        <td class="td-mono td-muted" style="text-align:right;">${b._prods}</td>
        <td class="td-mono" style="text-align:right; color:var(--green);">${b._ventas > 0 ? '$' + b._ventaTotal.toLocaleString('es-AR') : '<span style="color:var(--text2)">—</span>'}</td>
        <td>
          <div class="actions">
            <button class="btn-sm btn-plan"  onclick="modalPlan('${b.id}','${b.name}','${b.plan}')">Plan</button>
            ${b.plan === 'trial' ? `<button class="btn-sm btn-trial" onclick="modalTrial('${b.id}','${b.name}',${diasTrial || 0})">Trial</button>` : ''}
            ${b.active
              ? `<button class="btn-sm btn-tog-on"  onclick="toggleActivo('${b.id}', false, '${b.name}')">Desactivar</button>`
              : `<button class="btn-sm btn-tog-off" onclick="toggleActivo('${b.id}', true,  '${b.name}')">Activar</button>`
            }
          </div>
        </td>
      </tr>`;
  }).join('');

  container.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Negocio</th>
          <th>Email</th>
          <th>Plan</th>
          <th>Estado</th>
          <th>Trial restante</th>
          <th style="text-align:right">Productos</th>
          <th style="text-align:right">Ventas</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ── Activar / Desactivar ─────────────────────────────────────
async function toggleActivo(id, nuevoEstado, nombre) {
  const accion = nuevoEstado ? 'activar' : 'desactivar';
  if (!confirm(`¿Querés ${accion} el negocio "${nombre}"?`)) return;
  const { error } = await sb.rpc('admin_toggle_activo', { p_id: id, p_active: nuevoEstado });
  if (error) { toast('Error: ' + error.message, 'err'); return; }
  toast(`Negocio ${nuevoEstado ? 'activado' : 'desactivado'}`, 'ok');
  const b = todosNegocios.find(x => x.id === id);
  if (b) b.active = nuevoEstado;
  actualizarStats();
  filtrar();
}

// ── Modal cambiar plan ────────────────────────────────────────
function modalPlan(id, nombre, planActual) {
  const m = document.createElement('div');
  m.className = 'modal-overlay';
  m.id = 'modal-activo';
  m.innerHTML = `
    <div class="modal">
      <h3>Cambiar plan</h3>
      <p class="modal-sub"><strong>${nombre}</strong><br>Plan actual: <strong>${planActual}</strong></p>
      <div class="modal-field">
        <label>Nuevo plan</label>
        <select id="m-plan">
          <option value="trial"       ${planActual==='trial'?'selected':''}>Trial (7 días)</option>
          <option value="pro_mensual" ${planActual==='pro_mensual'?'selected':''}>Pro Mensual — $20.000/mes</option>
          <option value="pro_anual"   ${planActual==='pro_anual'?'selected':''}>Pro Anual — $200.000</option>
          <option value="multi"       ${planActual==='multi'?'selected':''}>Multi-negocio</option>
        </select>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
        <button class="btn-confirm" onclick="confirmarPlan('${id}')">Guardar</button>
      </div>
    </div>`;
  document.body.appendChild(m);
}

async function confirmarPlan(id) {
  const plan = document.getElementById('m-plan').value;
  const { error } = await sb.rpc('admin_set_plan', { p_id: id, p_plan: plan });
  if (error) { toast('Error: ' + error.message, 'err'); return; }
  toast('Plan actualizado a ' + plan, 'ok');
  const b = todosNegocios.find(x => x.id === id);
  if (b) b.plan = plan;
  cerrarModal();
  actualizarStats();
  filtrar();
}

// ── Modal extender trial ──────────────────────────────────────
function modalTrial(id, nombre, diasActuales) {
  const m = document.createElement('div');
  m.className = 'modal-overlay';
  m.id = 'modal-activo';
  m.innerHTML = `
    <div class="modal">
      <h3>Extender trial</h3>
      <p class="modal-sub"><strong>${nombre}</strong><br>Trial restante: <strong>${Math.max(0, diasActuales)} días</strong></p>
      <div class="modal-field">
        <label>Días a agregar</label>
        <input type="number" id="m-dias" value="7" min="1" max="365">
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
        <button class="btn-confirm" onclick="confirmarTrial('${id}', ${diasActuales})">Extender</button>
      </div>
    </div>`;
  document.body.appendChild(m);
}

async function confirmarTrial(id, diasActuales) {
  const dias = parseInt(document.getElementById('m-dias').value) || 7;
  const base = Math.max(0, diasActuales);
  const nuevaFecha = new Date(Date.now() + (base + dias) * 24 * 60 * 60 * 1000).toISOString();
  const { error } = await sb.rpc('admin_set_trial', { p_id: id, p_trial_ends: nuevaFecha });
  if (error) { toast('Error: ' + error.message, 'err'); return; }
  toast(`Trial extendido ${dias} días más`, 'ok');
  const b = todosNegocios.find(x => x.id === id);
  if (b) b.trial_ends = nuevaFecha;
  cerrarModal();
  filtrar();
}

function cerrarModal() {
  const m = document.getElementById('modal-activo');
  if (m) m.remove();
}

// ── Toast ─────────────────────────────────────────────────────
function toast(msg, tipo = 'ok') {
  const t = document.getElementById('toast');
  const el = document.createElement('div');
  el.className = `toast-item ${tipo}`;
  el.innerHTML = `${tipo === 'ok' ? '✓' : '✕'} ${msg}`;
  t.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; setTimeout(() => el.remove(), 300); }, 3000);
}
</script>
</body>
</html>
